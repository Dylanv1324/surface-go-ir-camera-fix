# Recommended Howdy settings for Surface Go 1 IR camera
# Apply with: sudo cp howdy-ir.conf /etc/howdy/config.ini
# Or apply individual settings with sed (see README)

[video]
device_path = /dev/video20
timeout = 10
certainty = 4.5
dark_threshold = 90
max_height = 480
frame_width = 640
frame_height = 480
recording_plugin = opencv
